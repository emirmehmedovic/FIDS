<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>Reklame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: #000000;
        }

        #media-container {
            width: 1920px;
            height: 1080px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
        }

        #media-img {
            width: 1920px;
            height: 1080px;
            object-fit: contain;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        #media-video {
            width: 1920px;
            height: 1080px;
            object-fit: contain;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        #empty-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: #333;
        }

        #progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            width: 0%;
            transition: width linear;
        }
    </style>
</head>
<body>
    <div id="media-container">
        <img id="media-img" src="" alt="" />
        <video id="media-video" src="" muted playsinline></video>
        <div id="empty-screen"></div>
        <div id="progress-bar"></div>
    </div>

    <script>
        (function() {
            var API_BASE_URL = 'http://192.168.18.15:5001';
            var REFRESH_INTERVAL = 30000; // Re-fetch playlist every 30 seconds
            var REKLAME_VERSION = '1.0.1';

            // Read screen ID from query param (?screen=1)
            var screenId = null;
            (function() {
                var search = window.location.search;
                if (search && search.length > 1) {
                    var pairs = search.substring(1).split('&');
                    for (var i = 0; i < pairs.length; i++) {
                        var pair = pairs[i].split('=');
                        if (pair[0] === 'screen') { screenId = pair[1] || null; break; }
                    }
                }
            })();

            // Simple version/cache busting
            var versionKey = 'reklameVersion_' + (screenId || 'default');
            if (localStorage.getItem(versionKey) !== REKLAME_VERSION) {
                localStorage.removeItem(versionKey);
                localStorage.setItem(versionKey, REKLAME_VERSION);
                if (!location.search.includes('nocache')) {
                    var sep = location.search.includes('?') ? '&' : '?';
                    location.href = location.pathname + location.search + sep + 'nocache=' + Date.now();
                }
            }

            if (!screenId) {
                document.getElementById('empty-screen').innerHTML =
                    '<div style="color:#ff6b6b;font-family:Arial,sans-serif;font-size:32px;text-align:center;padding:40px;">' +
                    '<p>⚠️ Nije specificiran ID ekrana</p>' +
                    '<p style="font-size:20px;color:#888;margin-top:16px;">Dodajte parametar u URL:<br><code style="background:#111;padding:8px 16px;border-radius:6px;">?screen=1</code></p>' +
                    '</div>';
                document.getElementById('empty-screen').style.display = 'flex';
                return;
            }

            var items = [];
            var currentIndex = 0;
            var advanceTimer = null;
            var fetchScheduled = false;

            var imgEl = document.getElementById('media-img');
            var videoEl = document.getElementById('media-video');
            var emptyEl = document.getElementById('empty-screen');
            var progressEl = document.getElementById('progress-bar');

            function showEmpty() {
                imgEl.style.display = 'none';
                videoEl.style.display = 'none';
                videoEl.pause();
                emptyEl.style.display = 'flex';
                progressEl.style.width = '0%';
                progressEl.style.transition = 'none';
            }

            function startProgress(durationMs) {
                progressEl.style.transition = 'none';
                progressEl.style.width = '0%';
                // Force reflow
                progressEl.offsetWidth;
                progressEl.style.transition = 'width ' + (durationMs / 1000) + 's linear';
                progressEl.style.width = '100%';
            }

            function showItem(item) {
                if (!item || !item.advertisement) {
                    showEmpty();
                    return;
                }

                var ad = item.advertisement;
                var duration = (item.duration || ad.duration || 10) * 1000;
                var fileUrl = ad.fileUrl;

                // Build full URL for uploads/ads
                if (fileUrl && fileUrl.indexOf('http') !== 0) {
                    fileUrl = API_BASE_URL + fileUrl;
                }

                emptyEl.style.display = 'none';

                if (ad.type === 'video') {
                    imgEl.style.display = 'none';
                    videoEl.style.display = 'block';
                    videoEl.src = fileUrl;
                    videoEl.currentTime = 0;
                    videoEl.play();

                    startProgress(duration);

                    // Video ended early - advance to next
                    videoEl.onended = function() {
                        clearAdvanceTimer();
                        advanceNext();
                    };

                    scheduleAdvance(duration);

                } else {
                    // image or gif
                    videoEl.style.display = 'none';
                    videoEl.pause();
                    videoEl.src = '';
                    videoEl.onended = null;

                    imgEl.src = fileUrl;
                    imgEl.style.display = 'block';

                    startProgress(duration);
                    scheduleAdvance(duration);
                }
            }

            function clearAdvanceTimer() {
                if (advanceTimer !== null) {
                    clearTimeout(advanceTimer);
                    advanceTimer = null;
                }
            }

            function scheduleAdvance(durationMs) {
                clearAdvanceTimer();
                advanceTimer = setTimeout(function() {
                    advanceTimer = null;
                    advanceNext();
                }, durationMs);
            }

            function advanceNext() {
                if (items.length === 0) {
                    showEmpty();
                    return;
                }
                currentIndex = (currentIndex + 1) % items.length;
                showItem(items[currentIndex]);
            }

            function startPlaylist() {
                if (items.length === 0) {
                    showEmpty();
                    return;
                }
                currentIndex = 0;
                showItem(items[currentIndex]);
            }

            function fetchPlaylist() {
                var xhr = new XMLHttpRequest();
                var url = API_BASE_URL + '/advertisements/active-playlist?screen=' + encodeURIComponent(screenId) + '&t=' + Date.now();
                xhr.open('GET', url, true);
                xhr.timeout = 10000;

                xhr.onreadystatechange = function() {
                    if (xhr.readyState !== 4) return;

                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            var newItems = data.items || [];

                            if (newItems.length === 0) {
                                items = [];
                                clearAdvanceTimer();
                                showEmpty();
                            } else {
                                var wasEmpty = items.length === 0;
                                items = newItems;

                                // If nothing was playing, start fresh
                                if (wasEmpty) {
                                    startPlaylist();
                                }
                                // Otherwise keep playing current item - it will advance naturally
                            }
                        } catch (e) {
                            console.error('Greška pri parsiranju odgovora:', e);
                        }
                    } else {
                        console.warn('Greška pri dobavljanju playliste:', xhr.status);
                    }
                };

                xhr.onerror = function() {
                    console.warn('Mrežna greška pri dobavljanju playliste');
                };

                xhr.ontimeout = function() {
                    console.warn('Timeout pri dobavljanju playliste');
                };

                xhr.send();
            }

            // Initial fetch + periodic refresh
            fetchPlaylist();
            setInterval(fetchPlaylist, REFRESH_INTERVAL);

            // Scheduled daily reload at 4:00 and 8:00
            function checkScheduledReload() {
                var now = new Date();
                var hour = now.getHours();
                var minute = now.getMinutes();
                if ((hour === 4 || hour === 8) && minute === 0) {
                    window.location.reload(true);
                }
            }
            setInterval(checkScheduledReload, 60000);

        })();
    </script>
</body>
</html>
